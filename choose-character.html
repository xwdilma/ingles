<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Your Character</title>
  <link rel="stylesheet" href="choose-character.css">
</head>
<body>
  <audio id="characterMusic" src="assets/lobby/sons/character-select.mp3" loop></audio>
  <audio id="characterClick" src="assets/lobby/sons/click.wav"></audio>
  <audio id="characterSelect" src="assets/lobby/sons/select.wav"></audio>
  <audio id="loadingMusic" src="assets/lobby/sons/loading.mp3" loop></audio>

  <div id="character-bg">
    <canvas id="particles"></canvas>
    <img src="assets/lobby/imagens/decoracoes/grama.png" class="decor" id="grass">
  </div>

  <div id="character-container">
    <button id="back-button" class="nav-button">
      <img src="assets/lobby/imagens/icons/back.png" alt="Back">
    </button>
    
    <div id="character-header">
      <h1>Choose Your Character</h1>
      <div id="compatibility-info">Characters matching your profile will be highlighted</div>
    </div>

    <div id="character-slider">
      <button id="prev-character" class="nav-button">←</button>
      
      <div id="character-grid"></div>
      
      <button id="next-character" class="nav-button">→</button>
    </div>

    <div id="character-details">
      <div id="character-portrait"></div>
      <div id="character-info">
        <h2 id="char-name"></h2>
        <div id="char-gender"></div>
        <div id="char-orientation"></div>
        <div id="char-bio"></div>
        <div id="compatibility-reason"></div>
      </div>
    </div>

    <div id="character-controls">
      <button id="random-character" class="control-button">
        <img src="assets/lobby/imagens/icons/random.png" alt="Random">
        Random
      </button>
      <button id="select-character" class="control-button" disabled>
        <img src="assets/lobby/imagens/icons/select.png" alt="Select">
        Select Character
      </button>
    </div>
  </div>

  <!-- Tela de Transição -->
  <div id="transition-screen">
    <div id="transition-message"></div>
  </div>

  <!-- Tela de Carregamento Super Premium -->
  <div id="premium-loading">
    <div id="pl-background"></div>
    
    <div id="pl-content">
      <div id="pl-animation-container">
        <div id="pl-spinner"></div>
        <div id="pl-particles"></div>
      </div>
      
      <div id="pl-text-container">
        <h2 id="pl-title">Embarking on Cultural Journey</h2>
        <div id="pl-tip"></div>
        
        <div id="pl-progress-container">
          <div id="pl-progress-bar"></div>
          <div id="pl-progress-text">0%</div>
        </div>
        
        <div id="pl-character-preview">
          <img id="pl-character-image" src="" alt="Selected character">
          <div id="pl-character-info">
            <h3 id="pl-character-name"></h3>
            <p id="pl-character-bio"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="choose-character.js"></script>
</body>
</html>
